<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>{{ title }}</title>

    <!-- CSS -->

    <link rel="stylesheet"
          href="/static/css/tailwind.css">

    <link rel="stylesheet"
          href="/static/css/coffee.css">

    <link rel="stylesheet"
          href="/static/css/layout.css">

    <link rel="stylesheet"
          href="/static/css/nav.css">

    <link rel="stylesheet"
          href="/static/css/orbit.css">

</head>

<body>

<!-- 顶部导航栏 -->
<header id="top-nav">
  <nav class="nav-inner">
    <!-- 左侧：主入口 -->
    <div class="nav-left">
      <div class="nav-search-box" id="nav-search-box">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="nav-search-input" placeholder="搜索相册、标签..." autocomplete="off" />
        <button class="nav-search-close" id="nav-search-close" title="关闭">&times;</button>
      </div>
      <button class="nav-link active" data-nav="explore" id="nav-explore">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        相册
      </button>
      <button class="nav-link" data-nav="story" id="nav-story">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        叙事
      </button>
    </div>

    <!-- 右侧：工具入口 -->
    <div class="nav-right">
      <button class="nav-icon-btn" id="nav-search-trigger" title="搜索">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="nav-icon-btn" id="nav-filter" title="筛选">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      </button>
      <button class="nav-icon-btn" id="nav-theme-toggle" title="切换主题">
        <svg class="nav-icon nav-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="nav-icon nav-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      
      {% if user %}
      <button class="nav-icon-btn" id="nav-upload-trigger" title="上传" onclick="openUploadModal()">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </button>
      {% endif %}

      <div class="nav-avatar-container" style="display: flex; align-items: center; gap: 8px;">
        {% if user %}
          <span style="color: white; font-size: 14px; opacity: 0.8;">{{ user.username }}</span>
          <a href="/logout" class="nav-icon-btn" title="退出" style="color: white; text-decoration: none; opacity: 0.8; font-size: 14px;">退出</a>
        {% else %}
          <button onclick="openAuthModal('login')" class="nav-icon-btn" title="登录" style="background: none; border: none; color: white; cursor: pointer; opacity: 0.8; font-size: 14px; padding: 0;">登录</button>
          <button onclick="openAuthModal('register')" class="nav-icon-btn" title="注册" style="background: none; border: none; color: white; cursor: pointer; opacity: 0.8; font-size: 14px; padding: 0;">注册</button>
        {% endif %}
      </div>
    </div>
  </nav>
</header>

{% block content %}
{% endblock %}

<script type="module"
        src="/static/js/main.js"></script>

<!-- Auth Modal -->
<div id="auth-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(5px);">
  <div style="background: rgba(30, 30, 30, 0.9); padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; color: white; border: 1px solid rgba(255,255,255,0.1); position: relative;">
    <button onclick="closeAuthModal()" style="position: absolute; top: 15px; right: 15px; background: none; border: none; color: white; opacity: 0.6; cursor: pointer; font-size: 24px; padding: 0; line-height: 1;">&times;</button>
    <h2 id="auth-title" style="margin-top: 0; text-align: center; margin-bottom: 30px; font-weight: 300; letter-spacing: 2px;">登录</h2>
    
    <div id="auth-error" style="color: #ff6b6b; margin-bottom: 20px; text-align: center; font-size: 14px; display: none;"></div>
    
    <form id="auth-form" style="display: flex; flex-direction: column; gap: 20px;">
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label for="modal-username" style="font-size: 14px; opacity: 0.8;">用户名</label>
        <input type="text" id="modal-username" required style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 6px; color: white; outline: none; font-size: 14px;">
      </div>
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label for="modal-password" style="font-size: 14px; opacity: 0.8;">密码</label>
        <input type="password" id="modal-password" required style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 6px; color: white; outline: none; font-size: 14px;">
      </div>
      <button type="submit" id="auth-submit-btn" style="background: white; color: black; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: opacity 0.2s; font-size: 14px;">
        登录
      </button>
    </form>
    
    <p style="text-align: center; margin-top: 20px; font-size: 14px; opacity: 0.8;">
      <span id="auth-switch-text">还没有账号？</span>
      <button onclick="switchAuthMode()" id="auth-switch-btn" type="button" style="background: none; border: none; color: white; text-decoration: underline; cursor: pointer; font-size: 14px; padding: 0;">注册</button>
    </p>
  </div>
</div>

<!-- Upload Modal -->
<div id="upload-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(5px);">
  <div style="background: rgba(30, 30, 30, 0.9); padding: 40px; border-radius: 12px; width: 100%; max-width: 500px; color: white; border: 1px solid rgba(255,255,255,0.1); position: relative;">
    <button onclick="closeUploadModal()" style="position: absolute; top: 15px; right: 15px; background: none; border: none; color: white; opacity: 0.6; cursor: pointer; font-size: 24px; padding: 0; line-height: 1;">&times;</button>
    <h2 style="margin-top: 0; text-align: center; margin-bottom: 30px; font-weight: 300; letter-spacing: 2px;">上传图片</h2>
    
    <div id="upload-error" style="color: #ff6b6b; margin-bottom: 20px; text-align: center; font-size: 14px; display: none;"></div>
    
    <form id="upload-form" style="display: flex; flex-direction: column; gap: 20px;">
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label for="upload-file" style="font-size: 14px; opacity: 0.8;">选择图片文件</label>
        <input type="file" id="upload-file" accept="image/*" required style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 6px; color: white; outline: none; font-size: 14px; width: 100%; box-sizing: border-box;">
      </div>
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label for="upload-title" style="font-size: 14px; opacity: 0.8;">标题 (可选)</label>
        <input type="text" id="upload-title" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 6px; color: white; outline: none; font-size: 14px;">
      </div>
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label for="upload-desc" style="font-size: 14px; opacity: 0.8;">描述 (可选)</label>
        <textarea id="upload-desc" style="height: 80px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 6px; color: white; outline: none; font-size: 14px;"></textarea>
      </div>
      <button type="submit" id="upload-submit-btn" style="background: white; color: black; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: opacity 0.2s; font-size: 14px;">
        上传
      </button>
    </form>
  </div>
</div>

<script>
  window.currentUser = {% if user %}{{ user | dump | safe }}{% else %}null{% endif %};
  let authMode = 'login';

  function openAuthModal(mode) {
    authMode = mode;
    updateAuthUI();
    document.getElementById('auth-modal').style.display = 'flex';
    document.getElementById('auth-error').style.display = 'none';
  }

  function closeAuthModal() {
    document.getElementById('auth-modal').style.display = 'none';
    document.getElementById('auth-form').reset();
  }

  function switchAuthMode() {
    authMode = authMode === 'login' ? 'register' : 'login';
    updateAuthUI();
    document.getElementById('auth-error').style.display = 'none';
  }

  function updateAuthUI() {
    const title = document.getElementById('auth-title');
    const submitBtn = document.getElementById('auth-submit-btn');
    const switchText = document.getElementById('auth-switch-text');
    const switchBtn = document.getElementById('auth-switch-btn');

    if (authMode === 'login') {
      title.innerText = '登录';
      submitBtn.innerText = '登录';
      switchText.innerText = '还没有账号？';
      switchBtn.innerText = '注册';
    } else {
      title.innerText = '注册';
      submitBtn.innerText = '注册';
      switchText.innerText = '已有账号？';
      switchBtn.innerText = '登录';
    }
  }

  document.getElementById('auth-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('modal-username').value;
    const password = document.getElementById('modal-password').value;
    
    const url = authMode === 'login' ? '/api/login' : '/api/register';
    
    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ username, password })
      });
      
      const data = await res.json();
      
      if (!res.ok) {
        document.getElementById('auth-error').innerText = data.error || '发生错误';
        document.getElementById('auth-error').style.display = 'block';
      } else {
        window.location.reload();
      }
    } catch (err) {
      document.getElementById('auth-error').innerText = '网络错误';
      document.getElementById('auth-error').style.display = 'block';
    }
  });

  // Close modal on click outside
  document.getElementById('auth-modal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('auth-modal')) {
      closeAuthModal();
    }
  });

  function openUploadModal() {
    document.getElementById('upload-modal').style.display = 'flex';
  }

  function closeUploadModal() {
    document.getElementById('upload-modal').style.display = 'none';
  }

  document.addEventListener('DOMContentLoaded', () => {
    const uploadForm = document.getElementById('upload-form');
    if (uploadForm) {
      uploadForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(uploadForm);
        
        try {
          const res = await fetch('/api/images/upload', {
            method: 'POST',
            body: formData
          });
          
          if (!res.ok) {
            alert('上传失败');
          } else {
            alert('上传成功！');
            closeUploadModal();
            window.location.reload();
          }
        } catch (err) {
          alert('网络错误');
        }
      });
    }
  });
</script>

<!-- Upload Modal -->
<div id="upload-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(5px);">
  <div style="background: rgba(30, 30, 30, 0.9); padding: 40px; border-radius: 12px; width: 100%; max-width: 500px; color: white; border: 1px solid rgba(255,255,255,0.1); position: relative;">
    <button onclick="closeUploadModal()" style="position: absolute; top: 15px; right: 15px; background: none; border: none; color: white; opacity: 0.6; cursor: pointer; font-size: 24px; padding: 0; line-height: 1;">&times;</button>
    <h2 style="margin-top: 0; text-align: center; margin-bottom: 30px; font-weight: 300; letter-spacing: 2px;">上传图片</h2>
    
    <form id="upload-form" style="display: flex; flex-direction: column; gap: 20px;">
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label style="font-size: 14px; opacity: 0.8;">图片文件 (最大 10MB)</label>
        <input type="file" name="file" accept="image/*" required style="color: white; font-size: 14px;">
      </div>
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label style="font-size: 14px; opacity: 0.8;">标题</label>
        <input type="text" name="title" required style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 6px; color: white; outline: none; font-size: 14px;">
      </div>
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label style="font-size: 14px; opacity: 0.8;">描述</label>
        <textarea name="description" rows="3" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 6px; color: white; outline: none; font-size: 14px; resize: vertical;"></textarea>
      </div>
      
      <button type="submit" style="background: white; color: black; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px;">上传并保存</button>
    </form>
  </div>
</div>

</body>

</html>
