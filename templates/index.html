{% extends "base.html" %}
{% block content %}

<!-- 背景 -->
<div id="background"></div>

<!-- 轨道舞台 -->
<div id="orbit-stage">
  <div id="orbit-system">
    <!-- 装饰环 -->
    <div class="orbit-ring ring-outer"></div>
    <div class="orbit-ring ring-inner"></div>

    <!-- 中心核心（咖啡杯） -->
    <div id="orbit-core">
      <div class="core-glow"></div>
      <div class="core-light"></div>
    </div>

    <!-- 照片层 - 3D 多层轨道 -->
    <div class="photo-layer" id="orbit-ring"></div>
  </div>
</div>

<!-- 详情面板 -->
<div class="detail-panel" id="detail-panel" style="display: none;">
  <div class="detail-content">
    <h2 class="detail-title">静谧之境</h2>
    <p class="detail-category">自然风光</p>
    <p class="detail-description">清晨的湖面如镜，倒映着远处的雪山与森林。</p>
    <div class="detail-meta">
      <div class="detail-date">2024.05.12</div>
      <div class="detail-camera">Canon EOS R5</div>
      <div class="detail-location">加拿大 · 班夫国家公园</div>
    </div>
    <div class="detail-tags">
      <span class="tag">#旅行</span>
      <span class="tag">#湖泊</span>
      <span class="tag">#雪山</span>
      <span class="tag">#森林</span>
    </div>
    <div class="detail-actions">
      <button class="action-btn">❤️ 收藏</button>
      <button class="action-btn">⬇️ 下载</button>
      <button class="action-btn">🔗 分享</button>
    </div>
  </div>
</div>

<!-- 底部缩略图栏 -->
<div class="thumbnail-bar" id="thumbnail-bar"></div>

<!-- 轨道示意图 -->
<div class="navigator" id="navigator">
  <canvas id="navigator-canvas"></canvas>
</div>

<!-- 控制面板 -->
<div class="control-panel">
  <div class="control-buttons">
    <button id="auto-rotate-btn">🔄 自动旋转</button>
    <button id="pause-btn">⏸️ 暂停</button>
  </div>
  <div class="control-sliders">
    <!-- 优化：增加了滑块组的视觉层次结构，引入图标和实时数值反馈，提升专业感 -->
    <div class="slider-group">
      <div class="slider-header">
        <label>
          <!-- 优化：引入精简的SVG图标，使视觉语义更清晰 -->
          <svg class="slider-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          速度
        </label>
        <span id="speed-value" class="slider-value">50%</span>
      </div>
      <!-- 优化：添加 custom-slider 类以便进行更深入的 CSS 样式定制 -->
      <input type="range" id="speed-slider" class="custom-slider" min="0" max="100" value="50" oninput="document.getElementById('speed-value').innerText = this.value + '%'">
    </div>
    
    <!-- 优化：为视角控制同样增加图标与数值实时反馈 -->
    <div class="slider-group">
      <div class="slider-header">
        <label>
          <svg class="slider-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          视角
        </label>
        <span id="view-value" class="slider-value">50°</span>
      </div>
      <input type="range" id="view-slider" class="custom-slider" min="0" max="100" value="50" oninput="document.getElementById('view-value').innerText = this.value + '°'">
    </div>
  </div>
</div>

{% endblock %}
